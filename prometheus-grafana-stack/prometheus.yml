global:
  scrape_interval: 15s

scrape_configs: # configuration for scraping metrics
  - job_name: 'node-exporter' # job name
    static_configs: # config for this job
      - targets: ['node-exporter:9100']
  - job_name: 'shoehub'
    static_configs:
      - targets: ['shoehub:8080']

rule_files: # to wire alerts, recording rules yaml manifests
  - /etc/prometheus/rules/*.yaml

